[mypy]
# Check against Python 3.14 stdlib types and signatures.
python_version = 3.14

# Treat app/ as the package root so `app.controllers` is never also resolved
# as a top-level `controllers` package. Required when running:
#   python -m mypy app main.py
explicit_package_bases = True

# Skip errors for third-party packages that don't ship type stubs
# (e.g. Pillow, SQLAlchemy 1.x, bcrypt, tkcalendar).
ignore_missing_imports = True

# SQLAlchemy 1.x Column(...) returns Column[T], not T — every attribute access
# would be flagged as Any. Disabled to avoid noise with no real benefit.
warn_return_any = False

# Fail if any [mypy-...] section in this file matches nothing — catches typos
# in module patterns before they silently stop working.
warn_unused_configs = True


# ── Data layer (app/core/db/models/) ─────────────────────────────────────────
# SQLAlchemy 1.x lacks mypy-compatible stubs. Column[T] assignments, seeder
# list literals, and ORM attribute access all produce false positives that
# cannot be fixed without migrating to SQLAlchemy 2.x + sqlalchemy2-stubs.
[mypy-app.core.db.models.*]
disable_error_code = assignment,list-item,no-any-return,attr-defined,arg-type,call-arg


# ── Presentation layer (app/presentation/) ───────────────────────────────────
# Two unavoidable Tkinter patterns cause false positives here:
#
#   1. canvas.image = photo  — assigns an image reference to a Canvas attribute
#      to prevent garbage collection (standard Tkinter trick). Canvas has no
#      declared `image` attribute, so mypy raises attr-defined/assignment.
#
#   2. Tk / Toplevel / Misc are used interchangeably at call sites, but mypy
#      does not model that relationship, raising arg-type and valid-type errors.
[mypy-app.presentation.*]
disable_error_code = attr-defined,arg-type,valid-type,assignment,func-returns-value
